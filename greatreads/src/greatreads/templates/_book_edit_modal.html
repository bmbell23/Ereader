{# Shared Edit Book modal (#110) — included on every page via base.html. Behavior
   in static/js/book_edit.js; page-specific refresh via window.bkeHooks. #}
<style>
    .bd-cover { aspect-ratio: 2/3; background: #e9ecef; border-radius: 6px; overflow: hidden;
        display: flex; align-items: center; justify-content: center; }
    .bd-cover img { width: 100%; height: 100%; object-fit: cover; }
    .bke-cover-empty { display: flex; align-items: center; justify-content: center;
        width: 100%; height: 100%; color: #adb5bd; font-size: .8rem; }
    /* Custom autocomplete (#107) — fixed on <body> so a scrollable modal can't clip it. */
    .ac-menu { position: fixed; z-index: 2000; background: #fff; border: 1px solid #ced4da;
        border-radius: .35rem; max-height: 200px; overflow-y: auto; box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .ac-item { padding: .4rem .65rem; font-size: .85rem; cursor: pointer;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ac-item:hover, .ac-item.ac-active { background: #e9f2ff; }
</style>
<div class="modal fade" id="bkEditModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit book</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="bkeId">
                <div class="row g-3">
                    <div class="col-12 col-sm-4">
                        <div class="bd-cover mb-2" id="bkeCover" style="max-width:170px;"></div>
                        <div class="d-grid gap-1" style="max-width:170px;">
                            <label class="btn btn-sm btn-outline-secondary mb-0">
                                <i class="fas fa-upload me-1"></i>Upload
                                <input type="file" id="bkeCoverFile" accept="image/*" hidden onchange="bkeUploadFile()">
                            </label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="bkeCoverUrl" placeholder="Image URL">
                                <button class="btn btn-outline-secondary" type="button" onclick="bkeCoverFromUrl()">Fetch</button>
                            </div>
                            <button class="btn btn-sm btn-outline-danger" type="button" onclick="bkeRemoveCover()">
                                <i class="fas fa-trash me-1"></i>Remove cover</button>
                        </div>
                    </div>
                    <div class="col-12 col-sm-8">
                        <div class="row g-2">
                            <div class="col-12"><label class="form-label small mb-0">Title</label>
                                <input class="form-control form-control-sm" id="bkeTitle" autocomplete="off"></div>
                            <div class="col-6"><label class="form-label small mb-0">Author first name</label>
                                <input class="form-control form-control-sm" id="bkeAuthorFirst" autocomplete="off"></div>
                            <div class="col-6"><label class="form-label small mb-0">Author last name</label>
                                <input class="form-control form-control-sm" id="bkeAuthorLast" autocomplete="off"></div>
                            <div class="col-8"><label class="form-label small mb-0">Series</label>
                                <input class="form-control form-control-sm" id="bkeSeries" autocomplete="off"></div>
                            <div class="col-4"><label class="form-label small mb-0">Series #</label>
                                <input class="form-control form-control-sm" id="bkeSeriesNum" type="number" step="0.1"></div>
                            <div class="col-6"><label class="form-label small mb-0">Universe</label>
                                <input class="form-control form-control-sm" id="bkeUniverse" autocomplete="off"></div>
                            <div class="col-6"><label class="form-label small mb-0">Genre</label>
                                <input class="form-control form-control-sm" id="bkeGenre" autocomplete="off"></div>
                            <div class="col-6"><label class="form-label small mb-0">Release date</label>
                                <input class="form-control form-control-sm" id="bkeDate" type="date"></div>
                            <div class="col-3"><label class="form-label small mb-0">Pages</label>
                                <input class="form-control form-control-sm" id="bkePages" type="number" min="0"></div>
                            <div class="col-3"><label class="form-label small mb-0">Words</label>
                                <input class="form-control form-control-sm" id="bkeWords" type="number" min="0"></div>
                            <div class="col-12"><label class="form-label small mb-0">ISBN</label>
                                <input class="form-control form-control-sm" id="bkeIsbn"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-danger me-auto" onclick="bkeDelete()">
                    <i class="fas fa-trash me-1"></i>Delete book</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-outline-primary" id="bkeSaveNextBtn" onclick="bkeSaveAndNext()" title="Save and edit the next book in this view">Save &amp; Next <i class="fas fa-arrow-right ms-1"></i></button>
                <button type="button" class="btn btn-primary" onclick="bkeSave()">Save changes</button>
            </div>
        </div>
    </div>
</div>
