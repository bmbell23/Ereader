<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Tell the WebView not to use its HTTP cache for this page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Ereader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            padding: 0;
            overflow-x: hidden;
        }
        .header {
            display: none;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .search {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .books {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }
        .book {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .book:active {
            transform: scale(0.95);
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .book-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.3;
        }
        .book-author {
            color: #aaa;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading-more {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            background: #ff5252;
            color: #fff;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
        }
        /* Build/version stamp — bump BUILD constant on every meaningful edit.
           Deliberately LOUD so you can verify the WebView picked up the new HTML. */
        #build-stamp {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            font-size: 16px;
            font-weight: bold;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: #fff;
            background: #d32f2f;
            padding: 6px 10px;
            text-align: center;
            z-index: 99999;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 My Ereader</h1>
        <input type="text" class="search" id="search" placeholder="Search books...">
    </div>

    <div id="content">
        <div class="loading">Loading your library...</div>
    </div>

    <div id="build-stamp"></div>

    <script>
        // ⬇ BUMP THIS on every reader/index change so you can confirm the WebView
        // picked up the new HTML. Format: YYYY-MM-DD.N
        const BUILD = '2026-05-29.3-MARGINS';

        document.getElementById('build-stamp').textContent = 'BUILD ' + BUILD;

        const API_URL = 'http://100.69.184.113:8091/api';
        let allBooks = [];
        let displayedBooks = [];
        let currentOffset = 0;
        const BATCH_SIZE = 50;
        let isLoading = false;
        let searchQuery = '';

        // Sorting now handled by backend

        async function loadBooks() {
            if (isLoading) return;
            isLoading = true;

            try {
                console.log('Fetching books from:', `${API_URL}/books?limit=${BATCH_SIZE}&offset=${currentOffset}`);
                const response = await fetch(`${API_URL}/books?limit=${BATCH_SIZE}&offset=${currentOffset}`);

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const text = await response.text();
                console.log('Response text length:', text.length);

                const data = JSON.parse(text);
                console.log('Parsed data:', data);

                const newBooks = data.books || [];
                console.log('New books count:', newBooks.length);

                // Backend now returns sorted books, so just append
                allBooks = allBooks.concat(newBooks);
                currentOffset += newBooks.length;

                displayedBooks = searchQuery ? allBooks.filter(book =>
                    book.title.toLowerCase().includes(searchQuery) ||
                    book.author.toLowerCase().includes(searchQuery)
                ) : allBooks;

                displayBooks(displayedBooks, newBooks.length < BATCH_SIZE);
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        Failed to load books: ${error.message}<br>
                        Check console for details.
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        function displayBooks(books, isComplete) {
            const content = document.getElementById('content');

            console.log('Displaying books:', books.length, 'isComplete:', isComplete);

            if (books.length === 0 && currentOffset === 0) {
                content.innerHTML = '<div class="loading">No books found</div>';
                return;
            }

            const booksHTML = books.map(book => {
                const format = (book.formats[0] || 'epub').toLowerCase();
                const coverUrl = book.cover || book.thumbnail;
                return `
                <div class="book" onclick="openBook('${book.id}', '${format}', '${encodeURIComponent(book.title)}')">
                    <img src="${coverUrl}" class="book-cover" onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                </div>
            `;}).join('');

            content.innerHTML = '<div class="books">' + booksHTML + '</div>' +
                (!isComplete ? '<div class="loading-more">Loading more...</div>' : '');
        }

        async function openBook(id, format, title) {
            // Append BUILD to bust the WebView's HTTP cache so reader.html is
            // re-fetched whenever we ship a new version of the page.
            const cached = await getCachedBook(id);
            const base = `reader.html?v=${BUILD}&id=${id}&format=${format}&title=${title}`;
            if (cached) {
                window.location.href = base + '&cached=true';
            } else {
                downloadAndCache(id, format);
                window.location.href = base;
            }
        }

        // IndexedDB for offline storage
        let db;
        function initDB() {
            const request = indexedDB.open('EreaderDB', 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('books')) {
                    db.createObjectStore('books', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
            };
        }

        async function getCachedBook(id) {
            return new Promise((resolve) => {
                if (!db) { resolve(null); return; }
                const tx = db.transaction(['books'], 'readonly');
                const store = tx.objectStore('books');
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }

        async function downloadAndCache(id, format) {
            try {
                const url = `${API_URL}/books/${id}/download?format=${format}`;
                const response = await fetch(url);
                const blob = await response.blob();

                if (db) {
                    const tx = db.transaction(['books'], 'readwrite');
                    const store = tx.objectStore('books');
                    store.put({ id, format, blob, cached: new Date() });
                }
            } catch (error) {
                console.error('Failed to cache book:', error);
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            const filtered = searchQuery ? allBooks.filter(book =>
                book.title.toLowerCase().includes(searchQuery) ||
                book.author.toLowerCase().includes(searchQuery)
            ) : allBooks;
            displayBooks(filtered, true);
        });

        // Infinite scroll
        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                if (!searchQuery) {
                    loadBooks();
                }
            }
        });

        initDB();
        loadBooks();
    </script>
</body>
</html>
