<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Tell the WebView not to use its HTTP cache for this page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GreatReads</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            padding: 0;
            overflow-x: hidden;
            /* Reserve room for the fixed .status-bar so the first row of book
               covers isn't clipped under it. Must equal the bar's height. */
            padding-top: 84px;
        }
        /* Top transparent status/toolbar.
           Row 1: clock (left) + version (right) — 28px tall
           Row 2: search input + sort dropdown — 56px tall */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99999;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
        }
        .status-bar-row1 {
            position: relative;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;   /* brand is centred in the row */
            padding: 0 28px;           /* inset from curved-screen edges */
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.3px;
        }
        /* Clock — pinned to the left with the same inset as the padding. */
        #status-clock {
            position: absolute;
            left: 28px;
            pointer-events: none;
        }
        /* Build stamp — pinned to the right; tappable to download update. */
        #build-stamp {
            position: absolute;
            right: 28px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }
        /* Brand wordmark — purple→pink→blue gradient sampled from the
           GreatReads launcher icon. Perfectly centred between the two pins. */
        .brand {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.4px;
            background: linear-gradient(90deg, #4067EF 0%, #8640C0 50%, #C940B0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }
        .status-bar-row2 {
            display: flex;
            gap: 8px;
            padding: 6px 10px 10px 10px;
            align-items: center;
        }
        .search {
            flex: 1;
            padding: 10px 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            min-width: 0;
        }
        .sort-select {
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            padding: 10px 8px;
            -webkit-appearance: none;
            appearance: none;
        }
        .icon-btn {
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            padding: 8px 12px;
            cursor: pointer;
            line-height: 1;
        }
        .menu-popup {
            position: fixed;
            top: 84px;
            right: 8px;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            z-index: 100000;
            min-width: 180px;
            display: none;
        }
        .menu-popup.open { display: block; }
        .menu-popup button {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        .menu-popup button:active { background: #3a3a3a; }
        /* Full-screen overlay for the highlights/bookmarks browser. */
        .overlay {
            position: fixed;
            inset: 0;
            background: #121212;
            z-index: 100001;
            display: none;
            flex-direction: column;
            /* Matches the fixed .overlay-header (title row + search row). */
            padding-top: 112px;
        }
        .overlay.open { display: flex; }
        .overlay-header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(18,18,18,0.95);
            display: flex; flex-direction: column; align-items: stretch;
            gap: 8px;
            padding: 8px 10px 10px 10px;
        }
        .overlay-header-row {
            display: flex; align-items: center; gap: 8px;
        }
        .overlay-title {
            flex: 1; font-size: 18px; font-weight: 600; color: #fff;
            padding: 0 4px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .overlay-header input {
            flex: 1; padding: 10px 12px; background: #2a2a2a;
            border: none; border-radius: 8px; color: #fff; font-size: 14px;
        }
        .overlay-list {
            flex: 1; overflow-y: auto; padding: 12px;
        }
        /* Per-book group: bold heading, items stacked under it. */
        .hl-group { margin-bottom: 18px; }
        .hl-group-head {
            position: sticky; top: 0;
            background: rgba(18,18,18,0.95);
            padding: 8px 4px 6px 4px;
            margin-bottom: 6px;
            display: flex; align-items: baseline; gap: 8px;
            border-bottom: 1px solid #333;
            z-index: 1;
        }
        .hl-group-title {
            font-size: 15px; font-weight: 700; color: #fff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1;
        }
        .hl-group-author { color: #999; font-size: 12px; font-weight: 400; }
        .hl-group-count {
            color: #888; font-size: 11px;
            background: #2a2a2a; padding: 2px 8px; border-radius: 10px;
        }
        .hl-item {
            background: #1e1e1e; border-radius: 8px; padding: 12px;
            margin-bottom: 10px; border-left: 4px solid #4caf50;
        }
        .hl-item.bookmark { border-left-color: #2196f3; }
        .hl-meta { color: #888; font-size: 11px; margin-bottom: 4px; }
        .hl-text { color: #ddd; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .hl-actions { margin-top: 8px; display: flex; gap: 8px; }
        .hl-actions button {
            background: #2a2a2a; border: none; border-radius: 6px;
            color: #fff; padding: 6px 10px; font-size: 12px; cursor: pointer;
        }
        .hl-actions button.danger { background: #5a2222; }
        .books {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }
        .book {
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .book:active {
            transform: scale(0.95);
        }
        .book-cover-wrap {
            position: relative;
            margin-bottom: 8px;
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: block;
        }
        /* Reading-progress bar over the bottom of a book cover */
        .book-progress {
            position: absolute;
            left: 4px;
            right: 4px;
            bottom: 4px;
            height: 4px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            overflow: hidden;
        }
        .book-progress-fill {
            height: 100%;
            background: #4caf50;
        }
        .book-cached-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }
        .book-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.3;
        }
        .book-author {
            color: #aaa;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading-more {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            background: #ff5252;
            color: #fff;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar-row1">
            <span id="status-clock"></span>
            <span class="brand">GreatReads</span>
            <span id="build-stamp"></span>
        </div>
        <div class="status-bar-row2">
            <input type="text" class="search" id="search" placeholder="Search books…">
            <select class="sort-select" id="sort-select" title="Sort">
                <option value="author">Author</option>
                <option value="title">Title</option>
                <option value="recent">Recently read</option>
            </select>
            <button class="icon-btn" id="menu-btn" title="Menu" aria-label="Menu">☰</button>
        </div>
    </div>

    <div class="menu-popup" id="menu-popup">
        <button id="menu-highlights">✏️ Highlights</button>
        <button id="menu-bookmarks">🔖 Bookmarks</button>
    </div>

    <!-- Highlights/Bookmarks overlay. The header title and search
         placeholder are updated by openOverlay() based on the type. -->
    <div class="overlay" id="hl-overlay" data-type="">
        <div class="overlay-header">
            <div class="overlay-header-row">
                <button class="icon-btn" onclick="closeHighlights()" title="Back">←</button>
                <div class="overlay-title" id="hl-title">Highlights</div>
            </div>
            <input type="text" id="hl-search" placeholder="Search…">
        </div>
        <div class="overlay-list" id="hl-list">
            <div class="loading">Loading…</div>
        </div>
    </div>

    <div id="content">
        <div class="loading">Loading your library...</div>
    </div>

    <script>
        // Build stamp: YYMMDD-HH:MM, generated fresh each page load so it
        // always reflects when the user last refreshed (also serves as a
        // lightweight cache-bust token). Tapping it navigates to the APK.
        const APK_URL = 'http://100.69.184.113:8090/ereader.apk';
        const buildStamp = document.getElementById('build-stamp');
        function fmtStamp() {
            const n = new Date();
            const yy = String(n.getFullYear()).slice(2);
            const mm = String(n.getMonth() + 1).padStart(2, '0');
            const dd = String(n.getDate()).padStart(2, '0');
            const hh = String(n.getHours()).padStart(2, '0');
            const mi = String(n.getMinutes()).padStart(2, '0');
            return `${yy}${mm}${dd}-${hh}:${mi}`;
        }
        const BUILD = fmtStamp();   // reused as cache-bust token in openBook()
        buildStamp.textContent = BUILD;
        buildStamp.title = 'Tap to download latest APK';
        buildStamp.addEventListener('click', () => { window.location.href = APK_URL; });

        // Status-bar clock (HH:MM, 24h)
        function tickClock() {
            const d = new Date();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            document.getElementById('status-clock').textContent = hh + ':' + mm;
        }
        tickClock();
        setInterval(tickClock, 30000);

        const API_URL = 'http://100.69.184.113:8091/api';
        let allBooks = [];
        let displayedBooks = [];
        let currentOffset = 0;
        const BATCH_SIZE = 50;
        let isLoading = false;
        let searchQuery = '';
        let sortMode = 'author';  // 'author' | 'title' | 'recent'
        // Snapshot of the non-search ("home") library + scroll position so we
        // can restore them when the user clears the search box. Without this,
        // clearing search would lose everything we'd lazily paged in.
        let homeBooks = [];
        let homeOffset = 0;
        let homeIsComplete = false;
        let searchAbortCtl = null;
        let searchSeq = 0;

        // Reading-state lookup (mirrors reader.html STATE_KEY format)
        function readingStateFor(id) {
            try {
                const raw = localStorage.getItem('ereader.state.' + id);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        async function loadBooks() {
            // Don't lazy-page while a search is active \u2014 search owns the result
            // set and infinite scroll would corrupt it.
            if (isLoading || searchQuery) return;
            isLoading = true;

            try {
                const url = `${API_URL}/books?limit=${BATCH_SIZE}&offset=${currentOffset}`;
                console.log('Fetching books from:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const newBooks = data.books || [];

                homeBooks = homeBooks.concat(newBooks);
                homeOffset += newBooks.length;
                homeIsComplete = newBooks.length < BATCH_SIZE;
                allBooks = homeBooks;
                currentOffset = homeOffset;

                displayBooks(allBooks, homeIsComplete);
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        Failed to load books: ${error.message}<br>
                        Check console for details.
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        // Server-side search across the WHOLE Calibre library, not just what's
        // currently loaded. Builds a Calibre-style query that matches title OR
        // author. Debounced + sequence-checked so a slow earlier response
        // can't clobber a faster later one.
        async function runServerSearch(q) {
            const mySeq = ++searchSeq;
            if (searchAbortCtl) searchAbortCtl.abort();
            searchAbortCtl = new AbortController();

            // Calibre query language: `title:"foo" or author:"foo"`. Quoting
            // keeps multi-word phrases intact and escapes the user input.
            const safe = q.replace(/"/g, '\\"');
            const calibreQuery = `title:"${safe}" or authors:"${safe}"`;
            const url = `${API_URL}/books?limit=200&offset=0&query=${encodeURIComponent(calibreQuery)}`;

            try {
                const response = await fetch(url, { signal: searchAbortCtl.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (mySeq !== searchSeq) return; // a newer search supersedes us
                const results = data.books || [];
                allBooks = results;
                displayBooks(results, true);
            } catch (e) {
                if (e.name === 'AbortError') return;
                console.error('Search failed:', e);
            }
        }

        function escapeHTML(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        function applySort(list) {
            const arr = list.slice();
            if (sortMode === 'title') {
                arr.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            } else if (sortMode === 'recent') {
                arr.sort((a, b) => {
                    const sa = readingStateFor(a.id);
                    const sb = readingStateFor(b.id);
                    return (sb ? sb.ts : 0) - (sa ? sa.ts : 0);
                });
            }
            // 'author' is the backend's natural order; leave as-is.
            return arr;
        }

        function displayBooks(books, isComplete) {
            const content = document.getElementById('content');

            console.log('Displaying books:', books.length, 'isComplete:', isComplete);

            if (books.length === 0 && currentOffset === 0) {
                content.innerHTML = '<div class="loading">No books found</div>';
                return;
            }

            const sorted = applySort(books);

            const booksHTML = sorted.map(book => {
                const format = (book.formats[0] || 'epub').toLowerCase();
                const coverUrl = book.cover || book.thumbnail;
                const state = readingStateFor(book.id);
                const progressPct = state && state.progress != null
                    ? Math.round(((state.page + 1) / state.total) * 100) : 0;
                const cachedDot = cachedBookIds.has(book.id)
                    ? '<div class="book-cached-dot" title="Downloaded"></div>' : '';
                const progressBar = progressPct > 0 ? `
                    <div class="book-progress" title="${progressPct}% read">
                        <div class="book-progress-fill" style="width: ${progressPct}%"></div>
                    </div>` : '';
                return `
                <div class="book" onclick="openBook('${book.id}', '${format}', '${encodeURIComponent(book.title)}')">
                    <div class="book-cover-wrap">
                        <img src="${coverUrl}" class="book-cover" onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                        ${cachedDot}
                        ${progressBar}
                    </div>
                    <div class="book-title">${escapeHTML(book.title)}</div>
                    <div class="book-author">${escapeHTML(book.author)}</div>
                </div>
            `;}).join('');

            content.innerHTML = '<div class="books">' + booksHTML + '</div>' +
                (!isComplete ? '<div class="loading-more">Loading more...</div>' : '');
        }

        async function openBook(id, format, title) {
            // Cache-bust reader.html via BUILD so HTML edits show up immediately.
            // The reader will pull the book blob from IndexedDB if we already
            // have it, or fetch + cache it on first open. We don't pre-fetch
            // here \u2014 the reader's own cache-then-network path handles it.
            window.location.href = `reader.html?v=${BUILD}&id=${id}&format=${format}&title=${title}`;
        }

        // IndexedDB for offline storage (schema MUST match reader.html)
        let db;
        const cachedBookIds = new Set();
        function initDB() {
            const request = indexedDB.open('EreaderDB', 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('books')) {
                    db.createObjectStore('books', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                refreshCachedIds();
            };
        }

        // Populate cachedBookIds so book covers can show a "downloaded" dot.
        function refreshCachedIds() {
            if (!db) return;
            try {
                const tx = db.transaction(['books'], 'readonly');
                const req = tx.objectStore('books').getAllKeys();
                req.onsuccess = () => {
                    cachedBookIds.clear();
                    (req.result || []).forEach(k => cachedBookIds.add(k));
                    if (allBooks.length > 0) reRender();
                };
            } catch (e) { /* ignore */ }
        }

        function reRender() {
            // allBooks already holds either the homeBooks set or the server's
            // search results, so we just re-paint it. Sorting + cached-dot
            // overlay is applied in displayBooks().
            displayBooks(allBooks, !searchQuery ? homeIsComplete : true);
        }

        // Debounce input so we don't fire a Calibre query on every keystroke.
        let _searchDebounce = null;
        document.getElementById('search').addEventListener('input', (e) => {
            const v = e.target.value.trim();
            searchQuery = v.toLowerCase();
            clearTimeout(_searchDebounce);
            _searchDebounce = setTimeout(() => {
                if (!v) {
                    // Restore the home (lazy-paged) view exactly as it was.
                    allBooks = homeBooks;
                    currentOffset = homeOffset;
                    displayBooks(allBooks, homeIsComplete);
                } else {
                    runServerSearch(v);
                }
            }, 250);
        });
        document.getElementById('sort-select').addEventListener('change', (e) => {
            sortMode = e.target.value;
            try { localStorage.setItem('ereader.sortMode', sortMode); } catch (_) {}
            reRender();
        });
        // Restore previously chosen sort
        try {
            const savedSort = localStorage.getItem('ereader.sortMode');
            if (savedSort) {
                sortMode = savedSort;
                document.getElementById('sort-select').value = sortMode;
            }
        } catch (_) {}
        // When returning from the reader, the cached set and reading state may
        // have changed \u2014 refresh on visibility-change.
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) { refreshCachedIds(); reRender(); }
        });

        // Infinite scroll
        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                if (!searchQuery) {
                    loadBooks();
                }
            }
        });

        // ---------- Hamburger menu ----------
        const menuBtn = document.getElementById('menu-btn');
        const menuPopup = document.getElementById('menu-popup');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuPopup.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!menuPopup.contains(e.target) && e.target !== menuBtn) {
                menuPopup.classList.remove('open');
            }
        });

        // ---------- Highlights & Bookmarks overlay ----------
        // Two entry points (Highlights / Bookmarks) drive the same overlay,
        // which renders items grouped by book in the SAME order the main
        // library uses (sortMode). Search box filters across all visible
        // fields client-side (text, bookTitle, bookAuthor, note).
        document.getElementById('menu-highlights').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openOverlay('highlight');
        });
        document.getElementById('menu-bookmarks').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openOverlay('bookmark');
        });
        function openOverlay(type) {
            const ov = document.getElementById('hl-overlay');
            ov.dataset.type = type;
            const isBM = (type === 'bookmark');
            document.getElementById('hl-title').textContent = isBM ? 'Bookmarks' : 'Highlights';
            document.getElementById('hl-search').placeholder =
                isBM ? 'Search bookmarks, books, authors…'
                     : 'Search highlights, books, authors…';
            document.getElementById('hl-search').value = '';
            ov.classList.add('open');
            loadHighlights();
        }
        function closeHighlights() {
            document.getElementById('hl-overlay').classList.remove('open');
        }
        let _hlDebounce = null;
        document.getElementById('hl-search').addEventListener('input', () => {
            clearTimeout(_hlDebounce);
            _hlDebounce = setTimeout(loadHighlights, 200);
        });

        async function loadHighlights() {
            const type = document.getElementById('hl-overlay').dataset.type || 'highlight';
            const q = document.getElementById('hl-search').value.trim();
            const list = document.getElementById('hl-list');
            list.innerHTML = '<div class="loading">Loading…</div>';
            const params = new URLSearchParams();
            params.set('type', type);
            if (q) params.set('q', q);
            try {
                const r = await fetch(`${API_URL}/highlights?` + params.toString());
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const data = await r.json();
                renderHighlights(data.items || [], type);
            } catch (e) {
                list.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
            }
        }
        function renderHighlights(items, type) {
            const list = document.getElementById('hl-list');
            if (!items.length) {
                const noun = type === 'bookmark' ? 'bookmarks' : 'highlights';
                const verb = type === 'bookmark' ? 'Bookmark a page' : 'Highlight some text';
                list.innerHTML = `<div class="loading">No ${noun} yet. ${verb} in a book to get started.</div>`;
                return;
            }
            // Group by bookId; newest item inside each group bubbles up first.
            const groups = new Map();  // bookId -> { title, author, items: [] }
            for (const it of items) {
                const bid = String(it.bookId);
                if (!groups.has(bid)) {
                    groups.set(bid, {
                        bookId: bid,
                        title:  it.bookTitle || '?',
                        author: it.bookAuthor || '',
                        items: [],
                    });
                }
                groups.get(bid).items.push(it);
            }
            // Order the book groups using the same sort as the main library.
            // applySort needs objects shaped like books — synthesize the
            // minimum it touches and fall through with .bookId so id-based
            // helpers (readingStateFor, etc.) keep working.
            const synthBooks = Array.from(groups.values()).map(g => ({
                id: g.bookId, title: g.title, author: g.author,
            }));
            // Books that aren't in allBooks (deleted from library, etc.)
            // are still synthesized above, so they always render — they
            // just sort by title/recent the same way.
            const ordered = applySort(synthBooks);
            list.innerHTML = ordered.map(b => {
                const g = groups.get(String(b.id));
                if (!g) return '';
                const itemsHTML = g.items.map(it => {
                    const when = new Date(it.created).toLocaleString();
                    const meta = `page ${it.page != null ? it.page + 1 : '?'}${it.total ? '/' + it.total : ''} · ${when}`;
                    const body = it.text || it.note || (it.type === 'bookmark' ? '🔖 Bookmark' : '');
                    return `<div class="hl-item ${it.type}">
                        <div class="hl-meta">${meta}</div>
                        <div class="hl-text">${escapeHTML(body)}</div>
                        <div class="hl-actions">
                            <button onclick="jumpToHighlight('${it.id}', '${it.bookId}', ${it.anchor != null ? it.anchor : 'null'}, ${it.page != null ? it.page : 'null'})">Open in book</button>
                            <button class="danger" onclick="deleteHighlight('${it.id}')">Delete</button>
                        </div>
                    </div>`;
                }).join('');
                return `<div class="hl-group">
                    <div class="hl-group-head">
                        <div class="hl-group-title">${escapeHTML(g.title)}<span class="hl-group-author">${g.author ? ' — ' + escapeHTML(g.author) : ''}</span></div>
                        <div class="hl-group-count">${g.items.length}</div>
                    </div>
                    ${itemsHTML}
                </div>`;
            }).join('');
        }
        window.jumpToHighlight = function(_id, bookId, anchor, page) {
            // Hand off to reader.html. It already reads localStorage state on
            // open; we stash a one-shot jump target so the reader knows to
            // override the saved position with this specific anchor/page.
            try {
                localStorage.setItem('ereader.jump.' + bookId,
                    JSON.stringify({ anchor, page, ts: Date.now() }));
            } catch (_) {}
            // Best-effort lookup of format from loaded books; fall back to epub.
            const b = allBooks.find(x => String(x.id) === String(bookId));
            const fmt = (b && (b.formats || [])[0]) || 'epub';
            const title = (b && b.title) || '';
            location.href = `reader.html?id=${encodeURIComponent(bookId)}&format=${encodeURIComponent(fmt)}&title=${encodeURIComponent(title)}`;
        };
        window.deleteHighlight = async function(id) {
            if (!confirm('Delete this item?')) return;
            try {
                await fetch(`${API_URL}/highlights/${id}`, { method: 'DELETE' });
                loadHighlights();
            } catch (_) {}
        };

        initDB();
        loadBooks();
    </script>
</body>
</html>
